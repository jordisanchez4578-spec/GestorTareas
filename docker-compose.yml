version: '3.8'

services:
  web:
    build: .
    container_name: gestor_web
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
    networks:
      - red_gestor

  db:
    image: mysql:8.0
    container_name: gestor_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: gestortareas
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - red_gestor

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: gestor_pma
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: 1234
    depends_on:
      - db
    networks:
      - red_gestor

networks:
  red_gestor:
    driver: bridge

volumes:
  db_data: